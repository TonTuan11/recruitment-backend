server:
  port: ${SERVER_PORT:5004}

spring:
  application:
    name: media-service

  config:
    import: optional:configserver:http://config-server:8888
    # optional: Do not crash the application immediately if the Config Server is unavailable.
    # configserver: Predefined prefix in Spring Boot.

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}

app:
  media-url: ${MEDIA_PUBLIC_URL:https://tizjob.id.vn}

