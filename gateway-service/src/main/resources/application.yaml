server:
  port: 1111

spring:
  application:
    name: gateway-service

  config:
    import: "optional:configserver:"  # call config server


  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-route
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**,/api/users/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: userServiceCB  # name instances circuit breaker (free)
                    fallbackUri: forward:/fallback/user-service-fallback  # when the service fails -> redirect internally to this fallback API

            - id: job-service-route
              uri: lb://JOB-SERVICE
              predicates:
                - Path=/api/jobs/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: jobServiceCB
                    fallbackUri: forward:/fallback/job-service-fallback

            - id: application-service-route
              uri: lb://APPLICATION-SERVICE
              predicates:
                - Path=/api/applications/**,/api/files/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: applicationServiceCB
                    fallbackUri: forward:/fallback/application-service-fallback

            - id: company-service-route
              uri: lb://COMPANY-SERVICE
              predicates:
                - Path=/api/companies/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: companyServiceCB
                    fallbackUri: forward:/fallback/company-service-fallback

            - id: media-service-route
              uri: lb://MEDIA-SERVICE
              predicates:
                - Path=/api/media/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: mediaServiceCB
                    fallbackUri: forward:/fallback/media-service-fallback



    config:
      discovery:
        enabled: true   #Enable discovery to find Config Server in Eureka.
        service-id: config-server



# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      userServiceCB:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

      jobServiceCB:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

      applicationServiceCB:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s


      companyServiceCB:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

      mediaServiceCB:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

  timelimiter:
    instances:
      userServiceCB:
        timeout-duration: 6s
      jobServiceCB:
        timeout-duration: 6s
      applicationServiceCB:
        timeout-duration: 6s
      companyServiceCB:
        timeout-duration: 6s
      mediaServiceCB:
        timeout-duration: 6s



#Eureka
eureka:
  instance:
    prefer-ip-address: true   # Use IP address instead of hostname
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
     #defaultZone: http://localhost:8762/eureka/   # register on Eureka
      defaultZone: http://eureka-server:8762/eureka/  # using Docker containers




logging:
  level:
    io.github.resilience4j.circuitbreaker: DEBUG
